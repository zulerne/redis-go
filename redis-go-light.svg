<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <defs>
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d63031"/>
      <stop offset="100%" style="stop-color:#a51d1d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="200" rx="16" fill="#f8f9fa"/>

  <!-- Subtle grid dots -->
  <g opacity="0.07">
    <circle cx="40" cy="40" r="1.2" fill="#d63031"/>
    <circle cx="80" cy="40" r="1.2" fill="#d63031"/>
    <circle cx="120" cy="40" r="1.2" fill="#d63031"/>
    <circle cx="160" cy="40" r="1.2" fill="#d63031"/>
    <circle cx="200" cy="40" r="1.2" fill="#d63031"/>
    <circle cx="40" cy="80" r="1.2" fill="#d63031"/>
    <circle cx="80" cy="80" r="1.2" fill="#d63031"/>
    <circle cx="40" cy="120" r="1.2" fill="#d63031"/>
    <circle cx="80" cy="120" r="1.2" fill="#d63031"/>
    <circle cx="120" cy="120" r="1.2" fill="#d63031"/>
    <circle cx="40" cy="160" r="1.2" fill="#d63031"/>
    <circle cx="600" cy="40" r="1.2" fill="#d63031"/>
    <circle cx="640" cy="40" r="1.2" fill="#d63031"/>
    <circle cx="680" cy="40" r="1.2" fill="#d63031"/>
    <circle cx="640" cy="80" r="1.2" fill="#d63031"/>
    <circle cx="680" cy="80" r="1.2" fill="#d63031"/>
    <circle cx="680" cy="120" r="1.2" fill="#d63031"/>
    <circle cx="640" cy="120" r="1.2" fill="#d63031"/>
    <circle cx="600" cy="120" r="1.2" fill="#d63031"/>
    <circle cx="680" cy="160" r="1.2" fill="#d63031"/>
    <circle cx="640" cy="160" r="1.2" fill="#d63031"/>
  </g>

  <!-- Database stack icon -->
  <g transform="translate(195, 48)">
    <ellipse cx="32" cy="20" rx="22" ry="9" fill="none" stroke="#d63031" stroke-width="2.5"/>
    <path d="M10 20 L10 48" stroke="#d63031" stroke-width="2.5"/>
    <path d="M54 20 L54 48" stroke="#d63031" stroke-width="2.5"/>
    <ellipse cx="32" cy="48" rx="22" ry="9" fill="none" stroke="#a51d1d" stroke-width="2.5" opacity="0.5"/>
    <path d="M10 48 L10 76" stroke="#d63031" stroke-width="2.5"/>
    <path d="M54 48 L54 76" stroke="#d63031" stroke-width="2.5"/>
    <ellipse cx="32" cy="76" rx="22" ry="9" fill="none" stroke="#a51d1d" stroke-width="2.5"/>
    <line x1="20" y1="33" x2="30" y2="33" stroke="#d63031" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="34" y1="33" x2="44" y2="33" stroke="#a51d1d" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="20" y1="61" x2="30" y2="61" stroke="#d63031" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="34" y1="61" x2="44" y2="61" stroke="#a51d1d" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- "redis-go" text -->
  <text x="268" y="115" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="56" font-weight="700" letter-spacing="-1" fill="#24292f">
    <tspan fill="url(#redisGrad)">redis</tspan>-go
  </text>

  <!-- Tagline -->
  <text x="270" y="145" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="14" fill="#656d76" letter-spacing="0.5">
    Redis server implementation in Go
  </text>
</svg>
