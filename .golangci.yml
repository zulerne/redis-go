version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/zulerne/redis-go

linters:
  default: none
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Additional verified linters
    - revive
    - gosec
    - gocritic
    - prealloc
    - unconvert
    - copyloopvar
    - intrange
    - modernize
    - nolintlint
    - perfsprint
    - unparam
    # Error handling
    - errorlint
    # Logging
    - sloglint
  settings:
    govet:
      enable:
        - shadow
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    nolintlint:
      require-explanation: true
      require-specific: true
    sloglint:
      no-global: all
      context: scope
  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - goconst
          - gosec
          - gocritic
